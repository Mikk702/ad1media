<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Ad1 Media</title>
</head>
<body>
    <header>
        <div class="desktop-banner">
            <img src="mainhoriz.jpg" alt="Main Horizontal Banner">
        </div>
    </header>

    <div class="image-video-container" style="background-image: url('img/1.png');">
        <video controls>
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <section class="mobile-section">
        <img src="mainvert.png" alt="Main Vertical Banner">
        <video controls>
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </section>
</body>
</html>
