<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Structure</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Website Title</h1>
    </header>
    <section class="horizontal-section">
        <div class="top-banner horizontal-banner">
            <h2>Top Banner Horizontal</h2>
        </div>
        <img src="1.png" alt="Middle Graphic" class="middle-graphic">
        <div class="video-section">
            <h3>Video Section</h3>
            <video controls>
                <source src="video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </section>
    <section class="vertical-section">
        <div class="top-banner vertical-banner">
            <h2>Top Banner Vertical</h2>
        </div>
        <p>This is the vertical section content.</p>
    </section>
    <footer>
        <p>Footer Content</p>
    </footer>
</body>
</html>
